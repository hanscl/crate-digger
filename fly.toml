# fly.toml — Crate Digger production deploy manifest.
#
# `app` and `primary_region` are placeholders; the GitHub Actions deploy job
# overrides app per-environment (staging vs production) via the
# `--app <name>` flag, and the Terraform module in
# `infrastructure/terraform/fly/` provisions both apps + secrets.
#
# Secrets (DATABASE_URL, ADMIN_PASSPHRASE, ANTHROPIC_API_KEY, source API keys)
# are NOT in this file — they are set via `flyctl secrets set` or the
# Terraform module.

app = "crate-digger"
primary_region = "fra"
kill_signal = "SIGTERM"
kill_timeout = "30s"

[build]
dockerfile = "Dockerfile"

[deploy]
# Runs in a one-off VM before the new release becomes the primary. If
# migrations fail the deploy aborts and the prior release stays serving.
release_command = "pnpm db:migrate"
strategy = "rolling"

[env]
NODE_ENV = "production"
PORT = "3000"

[http_service]
internal_port = 3000
force_https = true
auto_stop_machines = "off"
auto_start_machines = true
min_machines_running = 1
processes = ["app"]

[http_service.concurrency]
type = "requests"
soft_limit = 200
hard_limit = 250

[[http_service.checks]]
grace_period = "10s"
interval = "30s"
method = "GET"
path = "/api/health"
protocol = "http"
timeout = "5s"

[[vm]]
size = "shared-cpu-1x"
memory = "512mb"
cpu_kind = "shared"
cpus = 1

[processes]
app = "pnpm start"
