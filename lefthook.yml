pre-commit:
  piped: true
  commands:
    lint-fix:
      glob: "*.{ts,tsx,js,jsx,mjs,cjs}"
      run: pnpm exec oxlint --fix {staged_files}
      stage_fixed: true
    format:
      # Matches what `pnpm check` sees in CI. Keep in sync with oxfmt's
      # supported parsers — drift here is what let an unformatted .md file
      # slip past pre-commit and fail CI.
      glob: "*.{ts,tsx,mts,cts,js,jsx,mjs,cjs,json,jsonc,md,mdx,yml,yaml,css,scss,less,html}"
      run: pnpm exec oxfmt --write {staged_files}
      stage_fixed: true
    typecheck:
      run: pnpm typecheck

commit-msg:
  commands:
    conventional-commit:
      run: >
        echo "$(head -1 {1})" | grep -qE '^(feat|fix|docs|style|refactor|perf|test|build|ci|chore|revert)(\(.+\))?!?:\s.+' || {
          echo "ERROR: Commit message must follow Conventional Commits format.";
          echo "  e.g., feat: add user login";
          echo "  e.g., fix(parser): handle null input";
          echo "  Valid types: feat|fix|docs|style|refactor|perf|test|build|ci|chore|revert";
          exit 1;
        }
