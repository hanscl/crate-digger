name: Deploy

# Two-track deploy:
#   • push to main         → staging app (crate-digger-staging)
#   • tag matching v*      → production app (crate-digger), gated on the
#                            'production' GitHub Environment (configure
#                            required reviewers there if you want a manual
#                            approval gate)
#
# Both jobs run only after the CI workflow on the same SHA succeeds.
#
# Configure two repository secrets (Settings → Secrets and variables → Actions):
#   • FLY_API_TOKEN_STAGING     — app-scoped deploy token for crate-digger-staging
#   • FLY_API_TOKEN_PRODUCTION  — app-scoped deploy token for crate-digger
# Generate each with `flyctl tokens create deploy -a <app-name>`. Org-scoped
# tokens (`flyctl auth token`) are deliberately avoided so a leak in one
# environment cannot reach the other.
#
# Third-party actions are pinned to commit SHAs rather than tags/branches
# so a force-pushed tag or compromised upstream cannot swap the binary that
# runs alongside the deploy token.

on:
  push:
    branches:
      - main
    tags:
      - "v*"

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  wait-for-ci:
    name: Wait for CI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Wait for CI workflow on this SHA
        uses: lewagon/wait-on-check-action@ccfb013c15c8afb7bf2b7c028fb74dc5a068cccc # v1.3.4
        with:
          ref: ${{ github.sha }}
          check-name: check
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          wait-interval: 15
          allowed-conclusions: success

  deploy-staging:
    name: Deploy staging
    needs: wait-for-ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: staging
      url: https://crate-digger-staging.fly.dev
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@ed8efb33836e8b2096c7fd3ba1c8afe303ebbff1 # v1
      - run: flyctl deploy --remote-only --app crate-digger-staging --config fly.toml
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN_STAGING }}

  deploy-production:
    name: Deploy production
    needs: wait-for-ci
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://crate-digger.fly.dev
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@ed8efb33836e8b2096c7fd3ba1c8afe303ebbff1 # v1
      - run: flyctl deploy --remote-only --app crate-digger --config fly.toml
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN_PRODUCTION }}
