name: CI

on:
  push:
    branches:
      - main
      - "phase-*"
  pull_request:
    branches:
      - main

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm check

      - run: pnpm typecheck

      - run: pnpm test
        env:
          # Testcontainers' Ryuk reaper times out under some Docker setups.
          # Vitest's afterAll handles cleanup; disable Ryuk for stability.
          TESTCONTAINERS_RYUK_DISABLED: "true"
